<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#2c5282"/></linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg2)"/>
  <!-- Piston body -->
  <ellipse cx="200" cy="160" rx="90" ry="80" fill="#6b7280"/>
  <ellipse cx="200" cy="160" rx="80" ry="70" fill="#9ca3af"/>
  <!-- Piston rings -->
  <ellipse cx="200" cy="130" rx="85" ry="20" fill="none" stroke="#f97316" stroke-width="4"/>
  <ellipse cx="200" cy="150" rx="85" ry="20" fill="none" stroke="#e5e7eb" stroke-width="3"/>
  <ellipse cx="200" cy="168" rx="85" ry="20" fill="none" stroke="#e5e7eb" stroke-width="3"/>
  <!-- Wrist pin -->
  <circle cx="200" cy="190" r="18" fill="#f97316"/>
  <circle cx="200" cy="190" r="12" fill="#1f2937"/>
  <!-- Connecting rod -->
  <rect x="185" y="200" width="30" height="140" rx="5" fill="#6b7280"/>
  <rect x="175" y="330" width="50" height="30" rx="5" fill="#4b5563" stroke="#6b7280" stroke-width="2"/>
  <!-- Bolts -->
  <circle cx="155" cy="130" r="8" fill="#374151"/>
  <circle cx="245" cy="130" r="8" fill="#374151"/>
  <text x="200" y="385" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">PISTON ASSEMBLY</text>
</svg>
