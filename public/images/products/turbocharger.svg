<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#2c5282"/></linearGradient>
    <linearGradient id="metal" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" style="stop-color:#94a3b8"/><stop offset="50%" style="stop-color:#e2e8f0"/><stop offset="100%" style="stop-color:#94a3b8"/></linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg)"/>
  <!-- Turbine housing -->
  <circle cx="200" cy="200" r="120" fill="#374151" stroke="#f97316" stroke-width="3"/>
  <circle cx="200" cy="200" r="90" fill="#1f2937" stroke="#4b5563" stroke-width="2"/>
  <!-- Compressor wheel -->
  <circle cx="200" cy="200" r="60" fill="url(#metal)"/>
  <circle cx="200" cy="200" r="50" fill="#1f2937"/>
  <circle cx="200" cy="200" r="20" fill="#f97316"/>
  <!-- Blades -->
  <g fill="#cbd5e1" opacity="0.8">
    <polygon points="200,140 195,160 205,160"/>
    <polygon points="200,260 195,240 205,240"/>
    <polygon points="140,200 160,195 160,205"/>
    <polygon points="260,200 240,195 240,205"/>
  </g>
  <!-- Inlet/Outlet pipes -->
  <rect x="30" y="185" width="80" height="30" rx="5" fill="#374151" stroke="#4b5563" stroke-width="2"/>
  <rect x="290" y="185" width="80" height="30" rx="5" fill="#374151" stroke="#4b5563" stroke-width="2"/>
  <!-- Label -->
  <text x="200" y="370" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">TURBOCHARGER T4</text>
</svg>
