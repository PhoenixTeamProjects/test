<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#2c5282"/></linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg4)"/>
  <!-- Main cylinder -->
  <rect x="100" y="100" width="200" height="180" rx="20" fill="#6b7280"/>
  <rect x="110" y="110" width="180" height="160" rx="15" fill="#4b5563"/>
  <!-- Cooling fins -->
  <g fill="#9ca3af">
    <rect x="90" y="105" width="220" height="8" rx="2"/>
    <rect x="90" y="130" width="220" height="8" rx="2"/>
    <rect x="90" y="155" width="220" height="8" rx="2"/>
    <rect x="90" y="180" width="220" height="8" rx="2"/>
    <rect x="90" y="205" width="220" height="8" rx="2"/>
    <rect x="90" y="230" width="220" height="8" rx="2"/>
    <rect x="90" y="255" width="220" height="8" rx="2"/>
  </g>
  <!-- Pulley -->
  <circle cx="120" cy="310" r="50" fill="#374151" stroke="#6b7280" stroke-width="3"/>
  <circle cx="120" cy="310" r="30" fill="#4b5563"/>
  <circle cx="120" cy="310" r="10" fill="#f97316"/>
  <!-- Belt -->
  <path d="M120,360 Q250,360 280,200" stroke="#1f2937" stroke-width="6" fill="none"/>
  <!-- Pipes -->
  <rect x="270" y="130" width="60" height="20" rx="5" fill="#374151" stroke="#4b5563"/>
  <rect x="270" y="170" width="60" height="20" rx="5" fill="#374151" stroke="#4b5563"/>
  <text x="200" y="385" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">AIR COMPRESSOR C500</text>
</svg>
