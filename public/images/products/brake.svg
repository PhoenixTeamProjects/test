<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#2c5282"/></linearGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg3)"/>
  <!-- Main body -->
  <circle cx="200" cy="180" r="110" fill="#4b5563" stroke="#6b7280" stroke-width="3"/>
  <circle cx="200" cy="180" r="90" fill="#374151"/>
  <!-- Diaphragm -->
  <circle cx="200" cy="180" r="80" fill="#f97316" opacity="0.3"/>
  <circle cx="200" cy="180" r="60" fill="none" stroke="#f97316" stroke-width="3"/>
  <!-- Push rod -->
  <rect x="192" y="90" width="16" height="120" rx="8" fill="#9ca3af"/>
  <circle cx="200" cy="90" r="15" fill="#6b7280" stroke="#9ca3af" stroke-width="2"/>
  <!-- Mounting bolts -->
  <circle cx="120" cy="180" r="10" fill="#1f2937" stroke="#4b5563" stroke-width="2"/>
  <circle cx="280" cy="180" r="10" fill="#1f2937" stroke="#4b5563" stroke-width="2"/>
  <circle cx="200" cy="280" r="10" fill="#1f2937" stroke="#4b5563" stroke-width="2"/>
  <!-- Spring lines -->
  <g stroke="#f97316" stroke-width="2" fill="none" opacity="0.6">
    <path d="M150,160 Q200,140 250,160"/>
    <path d="M150,180 Q200,160 250,180"/>
    <path d="M150,200 Q200,180 250,200"/>
  </g>
  <text x="200" y="370" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">BRAKE CHAMBER 30/30</text>
</svg>
